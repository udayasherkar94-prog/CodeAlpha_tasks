<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="container">
    <h1>Portfolio Gallery</h1>
    
    <div class="filter-wrapper">
        <button class="filter-btn active" onclick="filterImages('all', event)">All</button>
        <button class="filter-btn" onclick="filterImages('nature', event)">Nature</button>
        <button class="filter-btn" onclick="filterImages('city', event)">City</button>
        <button class="filter-btn" onclick="filterImages('arch', event)">Architecture</button>
    </div>

    <div class="gallery-grid" id="gallery">
        <div class="gallery-item nature"><img src="https://picsum.photos/id/10/800/600" alt="Forest" onclick="openLightbox(0)"></div>
        <div class="gallery-item nature"><img src="https://picsum.photos/id/28/800/600" alt="Mountains" onclick="openLightbox(1)"></div>
        <div class="gallery-item nature"><img src="https://picsum.photos/id/15/800/600" alt="Waterfall" onclick="openLightbox(2)"></div>
        <div class="gallery-item nature"><img src="https://picsum.photos/id/16/800/600" alt="Sea" onclick="openLightbox(3)"></div>

        <div class="gallery-item city"><img src="https://picsum.photos/id/43/800/600" alt="Skyscrapers" onclick="openLightbox(4)"></div>
        <div class="gallery-item city"><img src="https://picsum.photos/id/48/800/600" alt="Night Street" onclick="openLightbox(5)"></div>
        <div class="gallery-item city"><img src="https://picsum.photos/id/33/800/600" alt="Bridge" onclick="openLightbox(6)"></div>
        <div class="gallery-item city"><img src="https://picsum.photos/id/57/800/600" alt="Cafe" onclick="openLightbox(7)"></div>

        <div class="gallery-item arch"><img src="https://picsum.photos/id/75/800/600" alt="Modern Hall" onclick="openLightbox(8)"></div>
        <div class="gallery-item arch"><img src="https://picsum.photos/id/84/800/600" alt="Old Window" onclick="openLightbox(9)"></div>
        <div class="gallery-item arch"><img src="https://picsum.photos/id/122/800/600" alt="Glass Building" onclick="openLightbox(10)"></div>
        <div class="gallery-item arch"><img src="https://picsum.photos/id/142/800/600" alt="Stairs" onclick="openLightbox(11)"></div>
    </div>
</div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <button class="prev" onclick="changeImage(-1)">&#10094;</button>
        <img id="lightbox-img" src="" alt="Zoomed view">
        <button class="next" onclick="changeImage(1)">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
